<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>メルカリ利益計算ツール｜ぱんだツール工房</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      padding: 20px;
      margin: 0;
      background: #f7f7f7;
      color: #222;
      line-height: 1.6;
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
    }

    header,
    .box {
      background: #fff;
      border: 1px solid #d9d9d9;
      border-radius: 16px;
      padding: 22px;
      box-sizing: border-box;
    }

    header {
      margin-bottom: 20px;
    }

    h1 {
      font-size: 28px;
      margin: 0 0 8px;
    }

    h2 {
      margin: 0 0 14px;
      font-size: 18px;
    }

    .lead {
      margin: 0;
      color: #555;
      font-size: 15px;
    }

    .layout {
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }

    .left-column {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 20px;
      min-width: 320px;
    }

    .right-column {
      flex: 1;
      min-width: 320px;
    }

    label {
      display: block;
      margin: 10px 0 6px;
      font-weight: 700;
      font-size: 14px;
    }

    input,
    select,
    button {
      width: 100%;
      box-sizing: border-box;
      font-size: 16px;
      padding: 11px 12px;
      border: 1px solid #bdbdbd;
      border-radius: 10px;
      background: #fff;
    }

    button {
      margin-top: 14px;
      background: #222;
      color: #fff;
      cursor: pointer;
      font-weight: 700;
      border: none;
    }

    button:hover {
      opacity: 0.88;
    }

    .reset-button {
      background: #999;
      margin-top: 10px;
    }

    .result {
      margin-top: 16px;
      white-space: pre-line;
      line-height: 1.7;
      font-weight: 700;
      background: #f3f3f3;
      border-radius: 12px;
      padding: 14px;
      min-height: 24px;
    }

    .note {
      font-size: 13px;
      color: #555;
      margin-top: 10px;
    }

    .hidden {
      display: none;
    }

    footer {
      max-width: 1100px;
      margin: 22px auto 0;
      padding: 16px;
      color: #666;
      font-size: 13px;
      text-align: center;
    }

    @media (max-width: 900px) {
      body {
        padding: 12px;
      }

      h1 {
        font-size: 23px;
      }

      .layout {
        flex-direction: column;
      }

      .left-column,
      .right-column {
        width: 100%;
        min-width: 0;
      }
    }
  </style>
</head>

<body>

  <div class="page">

    <header>
      <h1>メルカリ利益計算ツール</h1>
      <p class="lead">
        販売価格・送料・販売手数料から、手元に残る金額を自動計算できます。
      </p>
      <p class="note">
        ※配送カテゴリと発送方法を選択してから計算してください。
      </p>
    </header>

    <div class="layout">

      <div class="left-column">

        <!-- 利益から販売価格 -->
        <div class="box">

          <h2>① 利益から販売価格を計算</h2>

          <label>手元に残したい金額（円）</label>
          <input type="number" id="profit" placeholder="例：1000">

          <label>仕入れ価格（任意）</label>
          <input type="number" id="purchase" placeholder="例：500">

          <label>配送カテゴリ</label>
          <select id="shipping-category" onchange="updateShippingMethods('shipping-category','shipping-method','manual-box')">
            <option value="">選択してください</option>
            <option value="rakuraku">らくらくメルカリ便</option>
            <option value="yuyu">ゆうゆうメルカリ便</option>
            <option value="eco">エコメルカリ便</option>
            <option value="tanomeru">梱包・発送たのメル便</option>
            <option value="other">その他</option>
          </select>

          <div id="shipping-method-box" class="hidden">

            <label>発送方法</label>
            <select id="shipping-method"></select>

          </div>

          <div id="manual-box" class="hidden">

            <label>送料（円）</label>
            <input type="number" id="manual-shipping-fee" placeholder="例：300">

          </div>

          <button onclick="calculatePrice()">
            販売価格を計算
          </button>

          <button class="reset-button" onclick="resetPriceCalc()">
            リセット
          </button>

          <div id="result" class="result"></div>

        </div>

        <!-- 販売価格から利益 -->
        <div class="box">

          <h2>② 販売価格から利益を逆算</h2>

          <label>販売価格（円）</label>
          <input type="number" id="selling-price" placeholder="例：2000">

          <label>仕入れ価格（任意）</label>
          <input type="number" id="reverse-purchase" placeholder="例：500">

          <label>配送カテゴリ</label>
          <select id="reverse-category" onchange="updateShippingMethods('reverse-category','reverse-method','reverse-manual-box')">
            <option value="">選択してください</option>
            <option value="rakuraku">らくらくメルカリ便</option>
            <option value="yuyu">ゆうゆうメルカリ便</option>
            <option value="eco">エコメルカリ便</option>
            <option value="tanomeru">梱包・発送たのメル便</option>
            <option value="other">その他</option>
          </select>

          <div id="reverse-method-box" class="hidden">

            <label>発送方法</label>
            <select id="reverse-method"></select>

          </div>

          <div id="reverse-manual-box" class="hidden">

            <label>送料（円）</label>
            <input type="number" id="reverse-manual-fee" placeholder="例：300">

          </div>

          <button onclick="calculateProfit()">
            利益を計算
          </button>

          <button class="reset-button" onclick="resetProfitCalc()">
            リセット
          </button>

          <div id="reverse-result" class="result"></div>

        </div>

      </div>

    </div>

  </div>

  <footer>
    制作：ぱんだツール工房
  </footer>

  <script>

    const shippingData = {

      rakuraku: [
        { name: 'ネコポス', total: 210 },
        { name: '宅急便コンパクト', total: 520 },
        { name: '宅急便60', total: 750 },
        { name: '宅急便80', total: 850 },
        { name: '宅急便100', total: 1050 },
        { name: '宅急便120', total: 1200 },
        { name: '宅急便140', total: 1450 },
        { name: '宅急便160', total: 1700 },
        { name: '宅急便170', total: 2100 },
        { name: '宅急便180', total: 2100 },
        { name: '宅急便200', total: 2500 }
      ],

      yuyu: [
        { name: 'ゆうパケットポストmini', total: 180 },
        { name: 'ゆうパケットポスト（シール）', total: 220 },
        { name: 'ゆうパケットポスト（箱）', total: 280 },
        { name: 'ゆうパケット', total: 230 },
        { name: 'ゆうパケットプラス', total: 520 },
        { name: 'ゆうパック60', total: 750 },
        { name: 'ゆうパック80', total: 870 },
        { name: 'ゆうパック100', total: 1070 },
        { name: 'ゆうパック120', total: 1200 },
        { name: 'ゆうパック140', total: 1450 },
        { name: 'ゆうパック160', total: 1700 },
        { name: 'ゆうパック170', total: 1900 }
      ],

      eco: [
        { name: 'エコメルカリ便', total: 730 }
      ],

      tanomeru: [
        { name: '80サイズ', total: 1700 },
        { name: '120サイズ', total: 2400 },
        { name: '160サイズ', total: 3400 },
        { name: '200サイズ', total: 5000 },
        { name: '250サイズ', total: 8600 },
        { name: '300サイズ', total: 12000 },
        { name: '350サイズ', total: 18500 },
        { name: '400サイズ', total: 25400 },
        { name: '450サイズ', total: 33000 }
      ]

    };

    function updateShippingMethods(categoryId, methodId, manualBoxId) {

      const category = document.getElementById(categoryId).value;

      const methodSelect = document.getElementById(methodId);

      const manualBox = document.getElementById(manualBoxId);

      const methodBox = document.getElementById(methodId + '-box')
        || document.getElementById('shipping-method-box')
        || document.getElementById('reverse-method-box');

      methodSelect.innerHTML = '';

      methodBox.classList.add('hidden');
      manualBox.classList.add('hidden');

      if (!category) return;

      if (category === 'other') {

        manualBox.classList.remove('hidden');

        return;

      }

      const placeholder = document.createElement('option');

      placeholder.value = '';

      placeholder.textContent = '選択してください';

      methodSelect.appendChild(placeholder);

      shippingData[category].forEach((method, index) => {

        const option = document.createElement('option');

        option.value = index;

        option.textContent = `${method.name}（¥${method.total.toLocaleString()}）`;

        methodSelect.appendChild(option);

      });

      methodBox.classList.remove('hidden');

    }

    function getShipping(categoryId, methodId, manualId) {

      const category = document.getElementById(categoryId).value;

      if (!category) {

        return null;

      }

      if (category === 'other') {

        const manual = parseFloat(document.getElementById(manualId).value);

        if (isNaN(manual)) return null;

        return {
          name: 'その他',
          total: manual
        };

      }

      const index = document.getElementById(methodId).value;

      if (index === '') return null;

      return shippingData[category][index];

    }

    function calculatePrice() {

      const profit = parseFloat(document.getElementById('profit').value);

      const purchase = parseFloat(document.getElementById('purchase').value) || 0;

      const shipping = getShipping(
        'shipping-category',
        'shipping-method',
        'manual-shipping-fee'
      );

      if (isNaN(profit)) {

        document.getElementById('result').innerText =
          '手元に残したい金額を入力してください。';

        return;

      }

      if (!shipping) {

        document.getElementById('result').innerText =
          '配送方法を選択してください。';

        return;

      }

      const target = profit + purchase + shipping.total;

      const price = Math.ceil(target / 0.9);

      const fee = Math.floor(price * 0.1);

      document.getElementById('result').innerText =
`販売価格：¥${price.toLocaleString()}
販売手数料：¥${fee.toLocaleString()}
送料：¥${shipping.total.toLocaleString()}
発送方法：${shipping.name}`;

    }

    function calculateProfit() {

      const price = parseFloat(document.getElementById('selling-price').value);

      const purchase = parseFloat(document.getElementById('reverse-purchase').value) || 0;

      const shipping = getShipping(
        'reverse-category',
        'reverse-method',
        'reverse-manual-fee'
      );

      if (isNaN(price)) {

        document.getElementById('reverse-result').innerText =
          '販売価格を入力してください。';

        return;

      }

      if (!shipping) {

        document.getElementById('reverse-result').innerText =
          '配送方法を選択してください。';

        return;

      }

      const fee = Math.floor(price * 0.1);

      const profit = price - fee - shipping.total - purchase;

      document.getElementById('reverse-result').innerText =
`利益：¥${profit.toLocaleString()}
販売手数料：¥${fee.toLocaleString()}
送料：¥${shipping.total.toLocaleString()}
発送方法：${shipping.name}`;

    }

    function resetPriceCalc() {

      document.getElementById('profit').value = '';
      document.getElementById('purchase').value = '';
      document.getElementById('shipping-category').value = '';
      document.getElementById('shipping-method').innerHTML = '';
      document.getElementById('manual-shipping-fee').value = '';

      document.getElementById('shipping-method-box').classList.add('hidden');
      document.getElementById('manual-box').classList.add('hidden');

      document.getElementById('result').innerText = '';

    }

    function resetProfitCalc() {

      document.getElementById('selling-price').value = '';
      document.getElementById('reverse-purchase').value = '';
      document.getElementById('reverse-category').value = '';
      document.getElementById('reverse-method').innerHTML = '';
      document.getElementById('reverse-manual-fee').value = '';

      document.getElementById('reverse-method-box').classList.add('hidden');
      document.getElementById('reverse-manual-box').classList.add('hidden');

      document.getElementById('reverse-result').innerText = '';

    }

  </script>

</body>
</html>
